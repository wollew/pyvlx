name: Build and publish releases
on:
  workflow_run:
    workflows: [CI]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        persist-credentials: false

    - name: Set up Python 
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: Publish distribution package to TestPyPI
    if: startsWith(github.ref, 'refs/tags/')
    #if: startsWith(github.event.workflow_run.head_branch, 'refs/tags/') # run on all tags
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyvlx
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution package to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/


  publish-to-pypi:
    name: Publish distribution package to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    #if: startsWith(github.event.workflow_run.head_branch, 'refs/tags/') # run on all tags, check for release tags in a step
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyvlx
    permissions:
      id-token: write

    steps:
    - name: Check if tag is release # this unfortunately seems overly complicated
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        if [[ "$TAG" =~ ^v[0-9] ]]; then
          echo "RELEASE_TAG=true" >> $GITHUB_ENV
        else
          echo "RELEASE_TAG=false" >> $GITHUB_ENV
    - name: Download all the dists
      if: env.RELEASE_TAG == 'true'
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution package to PyPI
      if: env.RELEASE_TAG == 'true'
      uses: pypa/gh-action-pypi-publish@release/v1

